<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Global Transit Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background: #000; 
            color: white; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; position: relative;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(6, 182, 212, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(124, 58, 237, 0.2) 0%, transparent 50%);
        }

        /* Ambient glowing orb */
        body::before { 
            content: ''; position: fixed; width: 600px; height: 600px; border-radius: 50%; filter: blur(150px);
            z-index: -1; opacity: 0.2; background: #06B6D4; top: -100px; left: -200px; animation: drift 15s infinite alternate; 
        }
        @keyframes drift { 0% { transform: translateY(0); } 100% { transform: translateY(50px); } }

        .glass-panel { 
            background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(30px); border: 1px solid rgba(6, 182, 212, 0.2); 
            padding: 50px 60px; border-radius: 30px; width: 550px; box-shadow: 0 30px 60px rgba(0,0,0,0.8); text-align: center; 
        }
        
        h2 { font-family: 'Space Grotesk', sans-serif; font-size: 42px; font-weight: 800; margin-top: 0; margin-bottom: 5px; background: linear-gradient(to right, #FFFFFF, #06B6D4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        label { display: block; text-align: left; font-size: 18px; text-transform: uppercase; letter-spacing: 1.5px; color: #A1A1AA; font-weight: 700; margin-top: 30px; margin-bottom: 15px;}
        input { width: 100%; padding: 22px 25px; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.1); border-radius: 16px; color: white; box-sizing: border-box; font-size: 22px; font-family: 'Outfit'; outline: none; transition: 0.3s; }
        input:focus { border-color: #06B6D4; box-shadow: 0 0 20px rgba(6, 182, 212, 0.3); background: rgba(0,0,0,0.8); }
        
        button { width: 100%; padding: 24px; border: none; border-radius: 100px; font-weight: 800; font-family: 'Space Grotesk', sans-serif; font-size: 24px; cursor: pointer; margin-top: 50px; color: white; background: linear-gradient(135deg, #06B6D4, #7C3AED); transition: 0.3s; box-shadow: 0 10px 25px rgba(6, 182, 212, 0.3);}
        button:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(6, 182, 212, 0.5); }
        
        .footer-link { margin-top: 35px; color: #A1A1AA; font-size: 18px; font-weight: 600; display: block; text-decoration: none; transition: 0.2s; }
        .footer-link:hover { color: #FFFFFF; }
        
        #errorMsg { color: #ef4444; font-size: 18px; font-weight: 600; margin-top: 25px; display: none; background: rgba(239, 68, 68, 0.1); padding: 15px; border-radius: 12px; border: 1px solid rgba(239,68,68,0.3);}
    </style>
</head>
<body>

    <div class="glass-panel">
        <h2>Authenticate Session</h2>
        <p style="color: #A1A1AA; font-size: 18px; margin-bottom: 40px;">Access your private cryptographically secured ledger.</p>
        
        <label>Unique User ID</label>
        <input type="text" id="login-user" placeholder="e.g., node_user_01" required>

        <label>Passcode</label>
        <input type="password" id="login-pass" placeholder="••••••••" required>

        <button onclick="loginUser()">Establish Secure Connection</button>
        <div id="errorMsg"></div>

        <a href="user_signup.html" class="footer-link">Initialize a new node account ➔</a>
        <a href="index.html" class="footer-link" style="margin-top: 15px; color: #555; font-size: 16px;">Return to System Architecture</a>
    </div>

    <script>
        async function loginUser() {
            const user = document.getElementById("login-user").value.trim();
            const pass = document.getElementById("login-pass").value.trim();
            const errorMsg = document.getElementById("errorMsg");

            try {
                const response = await fetch("http://127.0.0.1:8000/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ user_id: user, password: pass })
                });

                const result = await response.json();

                if (result.success) {
                    localStorage.setItem("ActiveSession", user);
                    window.location.href = "user_dashboard.html";
                } else {
                    errorMsg.style.display = "block";
                    errorMsg.innerHTML = "🚨 Authentications Failed. Check credentials.";
                }
            } catch (error) {
                errorMsg.style.display = "block";
                errorMsg.innerHTML = "API Offline. Run python main.py";
            }
        }
    </script>
</body>
</html>
