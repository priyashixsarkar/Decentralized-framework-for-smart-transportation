<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Master Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background: #000; 
            color: white; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; position: relative;
            background-image: 
                radial-gradient(circle at 80% 50%, rgba(239, 68, 68, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 20% 50%, rgba(124, 58, 237, 0.2) 0%, transparent 50%);
        }

        /* Ambient glowing orb */
        body::before { 
            content: ''; position: fixed; width: 600px; height: 600px; border-radius: 50%; filter: blur(150px);
            z-index: -1; opacity: 0.2; background: #ef4444; top: -100px; right: -200px; animation: drift 15s infinite alternate; 
        }
        @keyframes drift { 0% { transform: translateY(0); } 100% { transform: translateY(50px); } }

        .glass-panel { 
            background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(30px); border: 1px solid rgba(239, 68, 68, 0.2); 
            padding: 50px 60px; border-radius: 30px; width: 550px; box-shadow: 0 30px 60px rgba(0,0,0,0.8); text-align: center; 
        }
        
        h2 { font-family: 'Space Grotesk', sans-serif; font-size: 42px; font-weight: 800; margin-top: 0; margin-bottom: 5px; background: linear-gradient(to right, #FFFFFF, #ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        label { display: block; text-align: left; font-size: 18px; text-transform: uppercase; letter-spacing: 1.5px; color: #A1A1AA; font-weight: 700; margin-top: 30px; margin-bottom: 15px;}
        input { width: 100%; padding: 22px 25px; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.1); border-radius: 16px; color: white; box-sizing: border-box; font-size: 22px; font-family: 'Outfit'; outline: none; transition: 0.3s; }
        input:focus { border-color: #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); background: rgba(0,0,0,0.8); }
        
        button { width: 100%; padding: 24px; border: none; border-radius: 100px; font-weight: 800; font-family: 'Space Grotesk', sans-serif; font-size: 24px; cursor: pointer; margin-top: 50px; color: white; background: linear-gradient(135deg, #ef4444, #7C3AED); transition: 0.3s; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);}
        button:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(239, 68, 68, 0.5); }
        
        .footer-link { margin-top: 35px; color: #A1A1AA; font-size: 18px; font-weight: 600; display: block; text-decoration: none; transition: 0.2s; }
        .footer-link:hover { color: #FFFFFF; }
        
        #errorMsg { color: #ef4444; font-size: 18px; font-weight: 600; margin-top: 25px; display: none; background: rgba(239, 68, 68, 0.1); padding: 15px; border-radius: 12px; border: 1px solid rgba(239,68,68,0.3);}
    </style>
</head>
<body>

    <div class="glass-panel">
        <h2>Administrator Interface</h2>
        <p style="color: #A1A1AA; font-size: 18px; margin-bottom: 40px;">Restricted Gateway. System Master Password Required.</p>
        
        <label>Admin ID</label>
        <input type="text" id="admin-user" placeholder="e.g., admin_master" required>

        <label>SysAdmin Password</label>
        <input type="password" id="admin-pass" placeholder="••••••••" required>

        <button onclick="loginAdmin()">Initialize Control Center</button>
        <div id="errorMsg"></div>

        <a href="index.html" class="footer-link">Cancel & Return to Public Network ➔</a>
    </div>

    <script>
        function loginAdmin() {
            const pass = document.getElementById("admin-pass").value.trim().toLowerCase();
            const errorMsg = document.getElementById("errorMsg");

            // Bulletproof Admin Logic for Live Demo
            if (pass === "admin" || pass === "root") {
                localStorage.setItem("AdminSession", "admin_master");
                window.location.href = "admin_dashboard.html";
            } else {
                errorMsg.style.display = "block";
                errorMsg.innerHTML = "🚨 ACCESS DENIED. Invalid SysAdmin Credentials.";
            }
        }
    </script>
</body>
</html>
