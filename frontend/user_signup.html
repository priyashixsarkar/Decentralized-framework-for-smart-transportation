<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration - Global Transit Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background: #000; 
            color: white; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; position: relative;
            background-image: 
                radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.2) 0%, transparent 50%),
                radial-gradient(circle at 20% 20%, rgba(6, 182, 212, 0.2) 0%, transparent 50%);
        }

        /* Ambient glowing orb */
        body::before { 
            content: ''; position: fixed; width: 600px; height: 600px; border-radius: 50%; filter: blur(150px);
            z-index: -1; opacity: 0.2; background: #7C3AED; top: -100px; right: -200px; animation: drift 15s infinite alternate; 
        }
        @keyframes drift { 0% { transform: translateY(0); } 100% { transform: translateY(50px); } }

        .glass-panel { 
            background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(30px); border: 1px solid rgba(124, 58, 237, 0.2); 
            padding: 50px 60px; border-radius: 30px; width: 550px; box-shadow: 0 30px 60px rgba(0,0,0,0.8); text-align: center; 
        }
        
        h2 { font-family: 'Space Grotesk', sans-serif; font-size: 42px; font-weight: 800; margin-top: 0; margin-bottom: 5px; background: linear-gradient(to right, #FFFFFF, #7C3AED); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        label { display: block; text-align: left; font-size: 18px; text-transform: uppercase; letter-spacing: 1.5px; color: #A1A1AA; font-weight: 700; margin-top: 30px; margin-bottom: 15px;}
        input { width: 100%; padding: 22px 25px; background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.1); border-radius: 16px; color: white; box-sizing: border-box; font-size: 22px; font-family: 'Outfit'; outline: none; transition: 0.3s; }
        input:focus { border-color: #7C3AED; box-shadow: 0 0 20px rgba(124, 58, 237, 0.3); background: rgba(0,0,0,0.8); }
        
        button { width: 100%; padding: 24px; border: none; border-radius: 100px; font-weight: 800; font-family: 'Space Grotesk', sans-serif; font-size: 24px; cursor: pointer; margin-top: 50px; color: white; background: linear-gradient(135deg, #7C3AED, #06B6D4); transition: 0.3s; box-shadow: 0 10px 25px rgba(124, 58, 237, 0.3);}
        button:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(124, 58, 237, 0.5); }
        
        .footer-link { margin-top: 35px; color: #A1A1AA; font-size: 18px; font-weight: 600; display: block; text-decoration: none; transition: 0.2s; }
        .footer-link:hover { color: #FFFFFF; }
        
        #errorMsg { color: #ef4444; font-size: 18px; font-weight: 600; margin-top: 25px; display: none; background: rgba(239, 68, 68, 0.1); padding: 15px; border-radius: 12px; border: 1px solid rgba(239,68,68,0.3);}
    </style>
</head>
<body>

    <div class="glass-panel">
        <h2>Network Registration</h2>
        <p style="color: #A1A1AA; font-size: 18px; margin-bottom: 30px;">Initialize your personal blockchain wallet.</p>
        
        <div style="display: flex; gap: 20px;">
            <div style="flex: 1;">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="John Doe" required>
            </div>
            <div style="flex: 1;">
                <label>Gov Email ID</label>
                <input type="email" id="reg-email" placeholder="user@transit.org" required>
            </div>
        </div>

        <label>Desired Node Identifier (User ID)</label>
        <input type="text" id="reg-user" placeholder="e.g., traveler_101" required>

        <div style="display: flex; gap: 20px;">
            <div style="flex: 1;">
                <label>Secure Passcode</label>
                <input type="password" id="reg-pass" placeholder="Min. 8 chars" required>
            </div>
            <div style="flex: 1;">
                <label>Confirm Passcode</label>
                <input type="password" id="reg-pass-confirm" placeholder="Repeat Passcode" required>
            </div>
        </div>

        <button onclick="registerUser()">Mint New Identity</button>
        <div id="errorMsg"></div>

        <a href="user_login.html" class="footer-link">Already have a node? Connect here ➔</a>
        <a href="index.html" class="footer-link" style="margin-top: 15px; color: #555; font-size: 16px;">Return to System Architecture</a>
    </div>

    <script>
        async function registerUser() {
            const name = document.getElementById("reg-name").value.trim();
            const email = document.getElementById("reg-email").value.trim();
            const user = document.getElementById("reg-user").value.trim();
            const pass = document.getElementById("reg-pass").value.trim();
            const passConfirm = document.getElementById("reg-pass-confirm").value.trim();
            const errorMsg = document.getElementById("errorMsg");

            // Basic Empty Field Validation
            if(name === "" || email === "" || user === "" || pass === "") {
                errorMsg.style.display = "block";
                errorMsg.innerHTML = "🚨 Error: All credential fields must be populated.";
                return;
            }

            // Password Complexity Verification
            if(pass.length < 5) {
                errorMsg.style.display = "block";
                errorMsg.innerHTML = "🚨 Error: Passcode must be at least 5 characters.";
                return;
            }

            // Double Check Matching Passwords
            if(pass !== passConfirm) {
                errorMsg.style.display = "block";
                errorMsg.innerHTML = "🚨 Error: Passcodes do not match.";
                return;
            }

            try {
                const response = await fetch("http://127.0.0.1:8000/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    // The backend primarily needs User ID and Password, but we've successfully validated local credentials
                    body: JSON.stringify({ user_id: user, password: pass })
                });

                if (response.ok) {
                    localStorage.setItem("ActiveSession", user);
                    window.location.href = "user_dashboard.html";
                } else {
                    errorMsg.style.display = "block";
                    errorMsg.innerHTML = "🚨 Error: User ID is already occupied on the network.";
                }
            } catch (error) {
                errorMsg.style.display = "block";
                errorMsg.innerHTML = "API Offline. Run python main.py";
            }
        }
    </script>
</body>
</html>
