<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Transit Portal - Book Tickets</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0c10; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-image: radial-gradient(circle at top, #1f2833, #0b0c10 70%);}
        .glass-panel { background: rgba(31, 40, 51, 0.7); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px; border: 1px solid rgba(102, 252, 241, 0.2); width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        h2 { color: #66fcf1; margin-top: 0; font-size: 28px; font-weight: 800;}
        label { font-size: 11px; color: #c5c6c7; text-transform: uppercase; letter-spacing: 1px; display: block; margin-top: 20px; margin-bottom: 5px; font-weight: 600;}
        input { width: 100%; padding: 14px; background: #1f2833; border: 1px solid #45a29e; border-radius: 8px; color: white; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s;}
        input:focus { border-color: #66fcf1; box-shadow: 0 0 10px rgba(102, 252, 241, 0.3); }
        button { width: 100%; padding: 15px; background: linear-gradient(90deg, #45a29e, #66fcf1); border: none; border-radius: 8px; color: #0b0c10; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 30px; transition: transform 0.2s, box-shadow 0.2s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 252, 241, 0.4);}
        .alert { display: none; padding: 15px; margin-top: 20px; border-radius: 8px; font-weight: 600; text-align: center; font-size: 14px; line-height: 1.5;}
        .alert-success { background: rgba(46, 213, 115, 0.1); color: #2ed573; border: 1px solid rgba(46, 213, 115, 0.3); }
        .alert-danger { background: rgba(255, 71, 87, 0.1); color: #ff4757; border: 1px solid rgba(255, 71, 87, 0.3); }
        .loading { color: #66fcf1; font-weight: 400; font-style: italic;}
    </style>
</head>
<body>
    <div class="glass-panel">
        <h2>Book Ticket</h2>
        <p style="color: #c5c6c7; font-size: 14px; margin-bottom: 30px;">Global Transport Hub</p>
        
        <label>Passenger Username</label>
        <input type="text" id="username" placeholder="e.g., user_101" required>

        <label>Account Password</label>
        <input type="password" id="password" placeholder="••••••••" required>

        <label>Destination City</label>
        <input type="text" id="destination" placeholder="e.g., Tokyo, Japan" required>
        
        <label>Ticket Price ($)</label>
        <input type="number" id="amount" value="150" readonly style="background: #0b0c10; opacity: 0.7;">

        <button onclick="attemptBooking()">Secure Purchase</button>
        
        <div id="statusBox" class="alert"></div>
    </div>

    <!-- INVISIBLE BEHAVIOR TRACKING SYSTEM -->
    <!-- This replaces the Admin Dashboard. The system secretly watches the user! -->
    <script>
        let startTime = Date.now();
        let failedAttempts = 0; // System secretly counts if they fail the password repeatedly

        async function attemptBooking() {
            const user = document.getElementById("username").value;
            const dest = document.getElementById("destination").value;
            const amt = parseFloat(document.getElementById("amount").value);
            const pass = document.getElementById("password").value;
            const statusBox = document.getElementById("statusBox");

            statusBox.style.display = "block";
            statusBox.className = "alert loading";
            statusBox.innerHTML = "Authenticating with Security Gateway...";

            // Simulate hacker behavior for the demo!
            // If you type "hacker" as the password, it forces the hidden bot variables
            if (pass.toLowerCase().includes("hack")) {
                failedAttempts += 10; // Instantly flags as a brute-force bot!
            }

            // 1. ASSEMBLE THE SECRET BEHAVIORAL PAYLOAD
            const sessionDuration = (Date.now() - startTime) / 1000;
            const secretBehaviorPayload = {
                user_id: user,
                login_hour: new Date().getHours(), // Grabs their actual computer time
                login_frequency: Math.floor(Math.random() * 3) + 1, // Simulated standard human frequency
                location_id: 12, // Simulated detected IP location
                device_id: 4, 
                transaction_amount: amt,
                time_spent: sessionDuration, // Tracks how fast they type
                failed_attempts: failedAttempts
            };

            try {
                // 2. SEND INVISIBLE PAYLOAD TO AI FIREWALL (main.py)
                const aiResponse = await fetch("http://127.0.0.1:8000/firewall/analyze", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify(secretBehaviorPayload)
                });
                const aiResult = await aiResponse.json();

                // 3. AI MAKES THE DECISION
                if (aiResult.status === "Suspicious") {
                    statusBox.className = "alert alert-danger";
                    statusBox.innerHTML = "🚨 <b>THREAT ISOLATED</b><br>AI Cognitive Firewall detected anomalous behavior. Data routed to Quarantine Ledger.";
                } else {
                    // 4. IF SAFE, PROCEED TO BLOCKCHAIN LEDGER
                    const bookResponse = await fetch("http://127.0.0.1:8000/book", {
                        method: "POST",
                        headers: {"Content-Type": "application/json"},
                        body: JSON.stringify({
                            user_id: user,
                            source: "Origin_Hub",
                            destination: dest,
                            amount: amt
                        })
                    });
                    const bookResult = await bookResponse.json();
                    statusBox.className = "alert alert-success";
                    statusBox.innerHTML = "✅ <b>AI Verified Passed!</b><br>Ticket successfully written to immutable Global Blockchain.";
                }
            } catch (error) {
                statusBox.className = "alert alert-danger";
                statusBox.innerHTML = "API Offline. Please run 'python main.py' in terminal.";
            }
        }
    </script>
</body>
</html>
